name: CI & Despliegue a GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: 'CI-CD-GHPages'
  cancel-in-progress: true

jobs:
  verificar_codigo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Verificar que existen los archivos principales
        run: |
          # Usamos 'ls' para fallar el job si el archivo no existe
          ls index.html
          ls style.css
          echo "✓ Archivos críticos encontrados."

  desplegar_pagina:
    needs: verificar_codigo
    # Solo despliega si es la rama 'main' Y no es un Pull Request
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
      - name: Subir Artifactos de Despliegue
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'
      - name: Iniciar Despliegue a Pages
        id: deployment
        uses: actions/deploy-pages@v4